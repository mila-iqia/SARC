        const opt = document.createElement('option');
        opt.value = String(n); opt.textContent = String(n);
        if (n === limit) opt.selected = true;
        sz.appendChild(opt);
      });
      // A new page size shifts page boundaries, so jump back to the first page.
      sz.addEventListener('change', () => {
        el._jtLimit = parseInt(sz.value, 10);
        el._jtOffset = 0;
        // Persist the page size (not the page) as the default for every tile.
        JOBTABLE_DEFAULTS.limit = el._jtLimit;
        saveState();
        reload();
      });
      szLabel.appendChild(sz);

      foot.append(first, prev, pageInfo, next, last, spacer, szLabel);

      // ── Column-visibility picker (caption line, right-aligned) ────────────
      // Pure display: toggling a checkbox shows/hides that column live (no
      // refetch) and the menu stays open. Mirrors the toolbar's cluster /
      // job-state dropdowns; the choice is global (jobTableHiddenCols).
      const colMenu = document.createElement('div');
      colMenu.className = 'js-dropdown jt-cols';
      const colBtn = document.createElement('button');
      colBtn.type = 'button';
      colBtn.className = 'add-select';
      colBtn.textContent = 'Columns ▾';
      colBtn.title = 'Show / hide table columns';
      const colPanel = document.createElement('div');
      colPanel.className = 'job-states-panel jt-cols-panel';
      colPanel.style.display = 'none';
      const colChecks = [];
      const setAllCols = visible => () => {
        COLS.forEach((c, i) => {
          colChecks[i].checked = visible;
          if (visible) jobTableHiddenCols.delete(c.key); else jobTableHiddenCols.add(c.key);
          setColVisible(c.key, visible);
        });
        saveState();
      };
      const mkColAct = (txt, fn) => {
        const b = document.createElement('button');
        b.type = 'button'; b.textContent = txt; b.addEventListener('click', fn);
        return b;
      };
      const colActions = document.createElement('div');
      colActions.className = 'js-actions';
      colActions.append(mkColAct('All', setAllCols(true)), mkColAct('None', setAllCols(false)));
      colPanel.appendChild(colActions);
      COLS.forEach(c => {
        const lbl = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !jobTableHiddenCols.has(c.key);
        cb.addEventListener('change', () => {
          if (cb.checked) jobTableHiddenCols.delete(c.key); else jobTableHiddenCols.add(c.key);
          setColVisible(c.key, cb.checked);
          saveState();
        });
        colChecks.push(cb);
        lbl.append(cb, ' ' + c.label);
        colPanel.appendChild(lbl);
      });
      function closeColMenu() {
        colPanel.style.display = 'none';
        document.removeEventListener('mousedown', onColMenuDown, true);
        el._jtCloseCols = null;
      }
      function onColMenuDown(e) {
        if (!colPanel.contains(e.target) && e.target !== colBtn) closeColMenu();
      }
      colBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (colPanel.style.display === 'none') {
          colPanel.style.display = 'block';
          el._jtCloseCols = closeColMenu;
          // Defer so this opening click isn't caught as an outside click.
          setTimeout(() => document.addEventListener('mousedown', onColMenuDown, true), 0);
        } else {
          closeColMenu();
        }
      });
      colMenu.append(colBtn, colPanel);
      caption.appendChild(colMenu);

      box.appendChild(caption);
      box.appendChild(wrap);
      box.appendChild(foot);
      el.appendChild(box);
    }

    // ── Focus helpers ────────────────────────────────────────────────────────

    // Active focus sub-range ('YYYY-MM-DDTHH:MM' UTC; '' = no focus). Set by
    // clicking a bar in the period plots, cleared by re-clicking the same bar
    // or via the Clear-focus button at the bottom of the toolbar.
    let focusStart = '';
    let focusEnd   = '';

    function periodStartToMs(s) {
      return new Date(s.length === 10 ? s + 'T00:00:00Z' : s.replace(' ', 'T') + ':00Z').getTime();
    }

    // Returns true/false if focus is active, null if no focus set (all bars same)
    function periodInFocus(periodStartStr) {
      if (!focusStart && !focusEnd) return null;
      const pMs = periodStartToMs(periodStartStr);
      const fsMs = focusStart ? new Date(focusStart + ':00Z').getTime() : -Infinity;
      const feMs = focusEnd   ? new Date(focusEnd   + ':00Z').getTime() :  Infinity;
      return pMs >= fsMs && pMs < feMs;
    }

    // Permanently-visible toolbar line (constant height via min-height, so
    // toggling focus never reflows the page): either the active focus range
    // plus the Clear-focus button, or a dimmed "No focus" hint.
    function updateFocusLabel() {
      const box = document.getElementById('focus-label');
      const btn = document.getElementById('clear-focus');
      const txt = document.getElementById('focus-label-text');
      if (!focusStart && !focusEnd) {
        box.classList.add('no-focus');
        txt.textContent = 'No focus — click a bar in a period plot to set one';
        btn.style.display = 'none';
      } else {
        box.classList.remove('no-focus');
        txt.textContent =
          'Focused on ' + focusStart.replace('T', ' ') + ' ; ' + focusEnd.replace('T', ' ');
        btn.style.display = '';
      }
    }

    function clearFocus() {
      focusStart = '';
      focusEnd   = '';
      updateFocusLabel();
      loadCharts();
    }

    function clickSetFocus(periodStartStr, periodEndStr) {
      const toInput   = ms => new Date(ms).toISOString().slice(0, 16);
      const newStart  = toInput(periodStartToMs(periodStartStr));
      const newEnd    = toInput(periodStartToMs(periodEndStr));
      // Toggle off if clicking the already-focused period
      if (focusStart === newStart && focusEnd === newEnd) {
        focusStart = '';
        focusEnd   = '';
      } else {
        focusStart = newStart;
        focusEnd   = newEnd;
      }
      updateFocusLabel();
      loadCharts();
    }

    // ── Data loading ─────────────────────────────────────────────────────────

    // Snapshot the form's parameters into a plain object. Returns null if
    // mandatory fields (start/end) are missing.
    // ── Job states selector ──────────────────────────────────────────────────
    const jsBtn = document.getElementById('js-btn');
    const jsPanel = document.getElementById('js-panel');
    let JOB_STATES = [];

    function jsSelected() {
      return [...jsPanel.querySelectorAll('input:checked')].map(c => c.value);
    }
    function jsUpdateLabel() {
      const n = jsSelected().length;
      jsBtn.textContent =
        (n === JOB_STATES.length ? 'All states' : n + ' selected') + ' ▾';
    }
    fetch('/dash/job_states').then(r => r.json()).then(states => {
      JOB_STATES = states;
      jsPanel.innerHTML =
        '<div class="js-actions"><button type="button" id="js-all">All</button>' +
        '<button type="button" id="js-none">None</button></div>' +
        states.map(s => `<label><input type="checkbox" value="${s}" checked> ${s}</label>`).join('');
      jsPanel.querySelectorAll('input').forEach(c => c.addEventListener('change', jsUpdateLabel));
      const setAll = v => () => {
        jsPanel.querySelectorAll('input').forEach(c => { c.checked = v; });
        jsUpdateLabel();
      };
      document.getElementById('js-all').addEventListener('click', setAll(true));
      document.getElementById('js-none').addEventListener('click', setAll(false));
      // Restore saved job-state selection.
      if (Array.isArray(_saved.job_states)) {
        jsPanel.querySelectorAll('input').forEach(c => {
          c.checked = _saved.job_states.includes(c.value);
        });
      }
      jsUpdateLabel();
    });
    jsBtn.addEventListener('click', e => {
      e.stopPropagation();
      jsPanel.style.display = jsPanel.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', e => {
      if (jsPanel.style.display !== 'none' && !jsPanel.contains(e.target) && e.target !== jsBtn)
        jsPanel.style.display = 'none';
    });

    // ── Period selector (radio dropdown, mirrors the job-states widget) ──────
    // Produces the API grammar: a bare letter (h/d/w/m) for calendar buckets,
    // or N+unit (e.g. 14d, 72h) for a fixed window stepping from Start.
    const periodBtn = document.getElementById('period-btn');
    const periodPanel = document.getElementById('period-panel');
    const periodN = document.getElementById('period-n');
    const periodUnit = document.getElementById('period-unit');
    const PERIOD_LABELS = { h: 'By hour', d: 'By day', w: 'By week', m: 'By month' };

    function periodMode() {
      return periodPanel.querySelector('input[name="period-mode"]:checked').value;
    }
    function periodCustomN() {
      return Math.max(1, Math.floor(Number(periodN.value) || 1));
    }
    function periodValue() {
      const mode = periodMode();
      return mode === 'custom' ? periodCustomN() + periodUnit.value : mode;
    }
    function periodUpdateLabel() {
      let txt = PERIOD_LABELS[periodMode()];
      if (!txt) {
        const n = periodCustomN();
        txt = 'Every ' + n + ' ' + (periodUnit.value === 'h' ? 'hour' : 'day') + (n > 1 ? 's' : '');
      }
      periodBtn.textContent = txt + ' ▾';
      syncRguUnitToPeriod();
    }
    // Keep the RGU display unit in step with the period bucket — one-way
    // (period -> unit); changing the unit never touches the period. Calendar
    // modes map straight across (h/d/w/m); a custom window follows its
    // hours/days selector. We fire the select's change event so the RGU tiles
    // re-scale in place at once (rerenderRguTiles), keeping "select = displayed
    // unit" true. That rescale is a cosmetic Y-axis change independent of the
    // bucket, so the unit can switch a moment before the bars do (the bucket
    // follows on the next Update); rerenderRguTiles is a no-op before the first
    // load, so the server-injected default syncs without a stray redraw.
    function syncRguUnitToPeriod() {
      const mode = periodMode();
      const target = mode === 'custom' ? periodUnit.value : mode;
      const sel = document.getElementById('rgu-unit');
      if (sel.value !== target && [...sel.options].some(o => o.value === target)) {
        sel.value = target;
        sel.dispatchEvent(new Event('change'));
      }
    }
    function setPeriod(s) {
      // Accepts the API grammar (used for the server-injected default).
      const m = /^(\d+(?:\.\d+)?)?\s*([hdwm]?)$/i.exec((s || '').trim()) || [];
      let num = m[1] ? parseFloat(m[1]) : null;
      let unit = (m[2] || (num !== null ? 'd' : 'w')).toLowerCase();
      if (num === null) {
        periodPanel.querySelector(`input[value="${unit}"]`).checked = true;
      } else {
        // The custom form only offers hours/days: rewrite w/m (and sub-day
        // day fractions) to keep the value representable.
        if (unit === 'w') { num *= 7; unit = 'd'; }
        if (unit === 'm') { num *= 30; unit = 'd'; }
        if (unit === 'd' && num < 1) { num *= 24; unit = 'h'; }
        periodPanel.querySelector('input[value="custom"]').checked = true;
        periodN.value = Math.max(1, Math.round(num));
        periodUnit.value = unit;
      }
      periodUpdateLabel();
    }
    periodBtn.addEventListener('click', e => {
      e.stopPropagation();
      periodPanel.style.display = periodPanel.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', e => {
      if (periodPanel.style.display !== 'none' && !periodPanel.contains(e.target) && e.target !== periodBtn)
        periodPanel.style.display = 'none';
    });
    periodPanel.querySelectorAll('input[name="period-mode"]')
      .forEach(r => r.addEventListener('change', periodUpdateLabel));
    // Touching the custom fields implies the custom mode.
    [periodN, periodUnit].forEach(el => {
      el.addEventListener('focus', () => {
        periodPanel.querySelector('input[value="custom"]').checked = true;
        periodUpdateLabel();
      });
      el.addEventListener('change', periodUpdateLabel);
    });
    setPeriod(periodPanel.dataset.default);

    function captureParams() {
      const start = document.getElementById('start').value;
      const end   = document.getElementById('end').value;
      if (!start || !end) return null;
      return {
        start, end,
        period:        periodValue(),
        clusters:      clSelected(),
        cluster_user:  document.getElementById('cluster_user').value.trim(),
        metric:        document.getElementById('metric-select').value,
        focus_start:   focusStart,
        focus_end:     focusEnd,
        job_states:    jsSelected(),
        rgu_type:      document.getElementById('rgu-type').value,
      };
    }

    // Append the cluster + job-state multi-filters that every endpoint shares.
    // Each is omitted when all (or none) are selected (= no filter).
    function withClustersAndStates(url, p) {
      if (p.clusters && p.clusters.length && p.clusters.length < CLUSTERS.length) {
        const sep = url.includes('?') ? '&' : '?';
        url += sep + p.clusters.map(c => 'clusters=' + encodeURIComponent(c)).join('&');
      }
      if (p.job_states && p.job_states.length && p.job_states.length < JOB_STATES.length) {
        const sep = url.includes('?') ? '&' : '?';
        url += sep + p.job_states.map(s => 'job_states=' + encodeURIComponent(s)).join('&');
      }
      return url;
    }

    function endpointURL(ep, p) {
      return withClustersAndStates(endpointURLBase(ep, p), p);
    }

    // /jobs base URL with explicit pagination + sort. Kept separate from
    // endpointURLBase so the job-table tile can re-fetch a different
    // page/sort — withClustersAndStates(jobsURL(...)) — without disturbing the
    // shared endpoint cache used by the other tiles.
    function jobsURL(p, { offset, limit, sortBy, sortDir }) {
      const base = { start: p.start, end: p.end,
                     ...(p.cluster_user ? { cluster_user: p.cluster_user } : {}) };
      const focusParams = {
        ...(p.focus_start ? { focus_start: p.focus_start } : {}),
        ...(p.focus_end   ? { focus_end:   p.focus_end   } : {}),
      };
      return '/dash/metrics/jobs?' + new URLSearchParams({
        ...base, metric: p.metric, ...focusParams, rgu_type: p.rgu_type,
        offset, limit, sort_by: sortBy, sort_dir: sortDir });
    }

    // /metric_comparison URL for the metric-heatmap tile. Separate from
    // endpointURLBase (like jobsURL) so the tile re-fetches its paired heatmap
    // for the picked secondary metric without touching the shared cache.
    function comparisonURL(p, metric2) {
      const focusParams = {
        ...(p.focus_start ? { focus_start: p.focus_start } : {}),
        ...(p.focus_end   ? { focus_end:   p.focus_end   } : {}),
      };
      return withClustersAndStates('/dash/metrics/metric_comparison?' + new URLSearchParams({
        start: p.start, end: p.end, metric: p.metric, metric2,
        ...(p.cluster_user ? { cluster_user: p.cluster_user } : {}),
        ...focusParams, rgu_type: p.rgu_type }), p);
    }

    function endpointURLBase(ep, p) {
      const base = { start: p.start, end: p.end,
                     ...(p.cluster_user ? { cluster_user: p.cluster_user } : {}) };
      const focusParams = {
        ...(p.focus_start ? { focus_start: p.focus_start } : {}),
        ...(p.focus_end   ? { focus_end:   p.focus_end   } : {}),
      };
      const densityParams = { ...base, metric: p.metric };
      switch (ep) {
        case 'data':      return '/dash/metrics/job_counts?' + new URLSearchParams({ ...base, period: p.period });
        case 'heatmap':   return '/dash/metrics/job_times_vs_limit?' + new URLSearchParams({ ...base, ...focusParams });
        case 'histogram': return '/dash/metrics/rgu_usage?' + new URLSearchParams({ ...base, period: p.period, metric: p.metric, rgu_type: p.rgu_type });
        case 'density':   return '/dash/metrics/metric_distribution?' + new URLSearchParams({ ...densityParams, ...focusParams, rgu_type: p.rgu_type });
        case 'user_rgu':  return '/dash/metrics/rgu_by_user?' + new URLSearchParams({ start: p.start, end: p.end, metric: p.metric, ...focusParams, rgu_type: p.rgu_type });
        case 'jobs':      return jobsURL(p, JOBTABLE_DEFAULTS);
        case 'rgu_by_cluster': return '/dash/metrics/rgu_by_cluster?' + new URLSearchParams({ start: p.start, end: p.end, period: p.period, ...(p.cluster_user ? { cluster_user: p.cluster_user } : {}), rgu_type: p.rgu_type });
        case 'metric_trend': return '/dash/metrics/metric_trend?' + new URLSearchParams({ ...base, period: p.period, metric: p.metric });
      }
      throw new Error('Unknown endpoint: ' + ep);
    }

    // Return a promise for the data of `ep`, fetching it once and caching it.
    // Multiple tiles can call this concurrently; they all share the same in-
    // flight promise.
    function ensureEndpoint(ep) {
      if (endpointCache[ep]) return endpointCache[ep];
      endpointStatus[ep] = 'loading';
      endpointCache[ep] = (async () => {
        try {
          const r = await fetch(endpointURL(ep, currentParams));
          if (!r.ok) throw new Error(`HTTP ${r.status} on /${ep}`);
          const data = await r.json();
          endpointStatus[ep] = 'ready';
          updateStatus();
          return data;
        } catch (e) {
          endpointStatus[ep] = 'error';
          updateStatus();
          throw e;
        }
      })();
      updateStatus();
      return endpointCache[ep];
    }

    function updateStatus() {
      const statusEl = document.getElementById('status');
      const states = Object.values(endpointStatus);
      const loading = states.filter(s => s === 'loading').length;
      const ready   = states.filter(s => s === 'ready').length;
      const errored = states.filter(s => s === 'error').length;
      if (loading > 0) {
        statusEl.textContent =
          `Loading ${loading} endpoint(s)… (${ready} ready` +
          (errored ? `, ${errored} error` : '') + ')';
      } else if (errored > 0) {
        statusEl.textContent = `${ready} endpoint(s) loaded, ${errored} error(s).`;
      } else if (ready > 0) {
        statusEl.textContent = `${ready} endpoint(s) loaded.`;
      } else {
        statusEl.textContent = '';
      }
    }

    // Draw a single tile: show "Loading…", await its endpoint, then either
    // render the plot or show an error. We must re-validate the chartDiv is
    // still in the DOM and still bound to the same plot type after the
    // await — the user may have removed or swapped the tile in the meantime.
    async function renderTile(chartDiv, plotType) {
      // The metric heatmap owns its data flow (per-tile secondary picker that
      // re-fetches /metric_comparison itself), so it skips the shared endpoint
      // cache: render it straight away and let its own draw() do the fetching.
      if (plotType === 'metricscatter') {
        chartDiv.innerHTML = '';
        renderPlot(chartDiv.id, plotType, {});
        return;
      }
      const ep = PLOT_TO_ENDPOINT[plotType];
      if (!ep) {
        chartDiv.innerHTML = `<div class="tile-error">Unknown plot type: ${plotType}</div>`;
        return;
      }
      chartDiv.innerHTML = '<div class="tile-loading">Loading…</div>';
      try {
        const data = await ensureEndpoint(ep);
        if (!document.body.contains(chartDiv)) return;
        if (chartDiv.dataset.plotType !== plotType) return;
        chartDiv.innerHTML = '';
        renderPlot(chartDiv.id, plotType, { [ENDPOINT_TO_KEY[ep]]: data });
      } catch (e) {
        if (!document.body.contains(chartDiv)) return;
        chartDiv.innerHTML = `<div class="tile-error">Error: ${e.message}</div>`;
      }
    }

    // Update button + click handlers (focus, user filter) call this. Captures
    // the current form values, invalidates the endpoint cache, and re-renders
    // every tile. Each tile then independently fetches what it needs.
    async function loadCharts() {
      const params = captureParams();
      if (params === null) {
        document.getElementById('status').textContent =
          'Please select start and end dates.';
        return;
      }
      currentParams   = params;
      endpointCache   = {};
      comparisonCache = {};
      endpointStatus  = {};
      saveState();
      updateStatus();
      renderLayout();
    }

    // ── Init ─────────────────────────────────────────────────────────────────

    // Layout: URL param wins over localStorage (allows bookmarkable layouts);
    // fall back to saved state, then to DEFAULT_LAYOUT.
    const _urlPlots = new URLSearchParams(window.location.search).get('plots');
    tileLayout = _urlPlots
      ? paramToLayout(_urlPlots)
      : (_saved.layout ? paramToLayout(_saved.layout) : DEFAULT_LAYOUT.map(r => [...r]));
    syncUrl();

    // Restore period (after setPeriod is defined, which is above).
    if (_saved.period) setPeriod(_saved.period);

    // Restore focus state.
    if (_saved.focusStart) focusStart = _saved.focusStart;
    if (_saved.focusEnd)   focusEnd   = _saved.focusEnd;
    updateFocusLabel();

    renderLayout();
