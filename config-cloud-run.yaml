# Config baked into the Cloud Run image.
# The password is NOT in this file — Cloud Run injects it via Secret Manager
# as the SARC_DB_PASSWORD env var, referenced below.
# `user` is either "user" or "user:password".
sarc:
  db:
    host: 34.152.3.253
    name: sarc-demo
    user: "postgres:${env:SARC_DB_PASSWORD}"
    sslmode: require
  patches: /tmp/patches
  clusters: {}
  cache: /tmp/cache
  server:
    auth: null
