# Config baked into the Cloud Run image.
# The password is NOT in this file — Cloud Run injects it via Secret Manager
# as the SARC_DB_PASSWORD env var, referenced below.
sarc:
  db:
    host: 34.152.3.253
    name: sarc-demo
    user: postgres
    password: "${env:SARC_DB_PASSWORD}"
    sslmode: require
    auto_upgrade: true
  patches: /tmp/patches
  clusters: {}
  cache: /tmp/cache
  server:
    auth: null
