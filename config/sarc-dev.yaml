      user_domain: drac
    trillium-gpu:
      host: trillium.alliancecan.ca
      private_key: pkey.yaml
      timezone: America/Montreal
      accounts:
        - rrg-bengioy-ad_gpu
        - rrg-bengioy-ad_cpu
        - def-bengioy_gpu
        - def-bengioy_cpu
      sacct_bin: "/opt/slurm/bin/sacct"
      prometheus_url:
