          2g.20gb: __MIG_FLAG__h100
          3g.40gb: __MIG_FLAG__h100
          nvidia_h100_80gb_hbm3_1g.10gb: $1g.10gb
          nvidia_h100_80gb_hbm3_2g.20gb: $2g.20gb
          nvidia_h100_80gb_hbm3_3g.40gb: $3g.40gb
    # old clusters
    beluga:
      host: beluga.computecanada.ca
      private_key: pkey.yaml
      user_domain: drac
      gpus_per_nodes:
        __DEFAULTS__:
          tesla_v100-sxm2-16gb: V100-SXM2-16GB
          Tesla V100-SXM2-16GB: V100-SXM2-16GB
    graham:
      host: graham.computecanada.ca
      private_key: pkey.yaml
