sarc:
  logging:
    log_level: WARNING
    OTLP_endpoint: http://loki01.server.mila.quebec:3100/otlp/v1/logs
    service_name: sarc-dev
    slack: null
  mongo:
    connection_string: mongodb://localhost:27017/sarc-dev
    database_name: sarc-dev
  db:
    host: localhost
    name: sarc-dev
  patches: secret/patches
  notifications:
    slack:
      description: test channel
      token: PLACEHOLDER
      channel: test
    enabled: True
    min_ratio: 0.80
    min_rgu_hours: 10752
    waste_rescale_threshold: 0.8
  cache: "../sarc-cache"
  sshconfig: "~/.ssh/config"
  clusters:
    mila:
      host: mila
      private_key: pkey.yaml
      timezone: America/Montreal
      accounts:
      sacct_bin: "/opt/slurm/bin/sacct"
      prometheus_url: http://prometheus01.server.mila.quebec:9090/
      start_date: "2022-04-01"
      billing_is_gpu: true
      user_domain: mila
      gpus_per_nodes:
        __DEFAULTS__:
          rtx8000: RTX8000
          NVIDIA A100 80GB PCIe: A100-PCIe-80GB
          NVIDIA A100-SXM4-40GB: A100-SXM4-40GB
          NVIDIA A100-SXM4-80GB: A100-SXM4-80GB
          NVIDIA H100 80GB HBM3: H100-SXM5-80GB
          NVIDIA L40S: L40S
          l40S: L40S
          NVIDIA RTX A6000: A6000
          Quadro RTX 8000: RTX8000
          Tesla V100-SXM2-32GB: V100-SXM2-32GB
          Tesla V100-SXM2-32GB-LS: V100-SXM2-32GB
        cn-b[001-005]:
          v100: V100-SXM2-32GB
        cn-d[001-002]:
          a100: A100-SXM4-40GB
        cn-d[003-004]:
          a100l: A100-SXM4-80GB
        cn-e[002-003]:
          v100: V100-SXM2-32GB
        cn-g[001-029]:
          a100l: A100-SXM4-80GB
          2g.20gb: __MIG_FLAG__a100l
          3g.40gb: __MIG_FLAG__a100l
          4g.40gb: __MIG_FLAG__a100l
        cn-i001:
          a100l: A100-PCIe-80GB
        cn-j001:
          a6000: A6000
        cn-k[001-004]:
          a100: A100-SXM4-40GB
        cn-l[001-091]:
          l40s: L40S
        cn-n[001-002]:
          h100: H100-SXM5-80GB
    narval:
      host: narval.computecanada.ca
      private_key: pkey.yaml
      timezone: America/Montreal
      accounts:
        - rrg-bengioy-ad_gpu
        - rrg-bengioy-ad_cpu
        - def-bengioy_gpu
        - def-bengioy_cpu
      sacct_bin: "/opt/software/slurm/bin/sacct"
      diskusage:
        - name: drac
      prometheus_url: https://mila-thanos.calculquebec.ca
      #prometheus_headers: ../../SARC_secrets/secrets/drac_prometheus/headers.json
      start_date: "2022-04-01"
      user_domain: drac
      gpus_per_nodes:
        __DEFAULTS__:
          a100: A100-SXM4-40GB
          NVIDIA A100-SXM4-40GB: A100-SXM4-40GB
          1g.5gb: __MIG_FLAG__a100
          2g.10gb: __MIG_FLAG__a100
          3g.20gb: __MIG_FLAG__a100
          4g.20gb: __MIG_FLAG__a100
          a100_1g.5gb: $1g.5gb
          a100_2g.10gb: $2g.10gb
          a100_3g.20gb: $3g.20gb
          a100_4g.20gb: $4g.20gb
          "A100-SXM4-40GB : 1g.5gb": $1g.5gb
          "A100-SXM4-40GB : 2g.10gb": $2g.10gb
          "A100-SXM4-40GB : 3g.20gb": $3g.20gb
          "A100-SXM4-40GB : 4g.20gb": $4g.20gb
    tamia:
      host: tamia.alliancecan.ca
      private_key: pkey.yaml
      timezone: America/Montreal
      accounts:
      sacct_bin: "/opt/slurm/bin/sacct"
      prometheus_url:
      start_date: "2025-02-01"
      user_domain: drac
      gpus_per_nodes:
        __DEFAULTS__:
          h100: H100-SXM5-80GB
          h200: H200-SXM5-141GB
        tg[10601-10606,10701-10707,10801-10807,10901-10908,11101-11107,11201-11207]:
          h100: H100-SXM5-80GB
    fir:
      host: fir.alliancecan.ca
      private_key: pkey.yaml
      timezone: America/Vancouver
      accounts:
        - rrg-bengioy-ad_gpu
        - rrg-bengioy-ad_cpu
        - def-bengioy_gpu
        - def-bengioy_cpu
      sacct_bin: "/opt/software/slurm/bin/sacct"
      ignore_tz_utc: true
      prometheus_url:
      start_date: "2025-08-11"
      user_domain: drac
      gpus_per_nodes:
        __DEFAULTS__:
          h100: H100-SXM5-80GB
          1g.10gb: __MIG_FLAG__h100
          2g.20gb: __MIG_FLAG__h100
          3g.40gb: __MIG_FLAG__h100
          nvidia_h100_80gb_hbm3_1g.10gb: $1g.10gb
          nvidia_h100_80gb_hbm3_2g.20gb: $2g.20gb
          nvidia_h100_80gb_hbm3_3g.40gb: $3g.40gb
    nibi:
      host: nibi.alliancecan.ca
      private_key: pkey.yaml
      timezone: America/Toronto
      accounts:
        - rrg-bengioy-ad_gpu
        - rrg-bengioy-ad_cpu
        - def-bengioy_gpu
        - def-bengioy_cpu
      sacct_bin: "/opt/software/slurm/bin/sacct"
      prometheus_url:
      start_date: "2025-07-31"
      user_domain: drac
      gpus_per_nodes:
        __DEFAULTS__:
          h100: H100-SXM5-80GB
          1g.10gb: __MIG_FLAG__h100
          2g.20gb: __MIG_FLAG__h100
          3g.40gb: __MIG_FLAG__h100
          nvidia_h100_80gb_hbm3_1g.10gb: $1g.10gb
          nvidia_h100_80gb_hbm3_2g.20gb: $2g.20gb
          nvidia_h100_80gb_hbm3_3g.40gb: $3g.40gb
    rorqual:
      host: rorqual.alliancecan.ca
      private_key: pkey.yaml
      timezone: America/Montreal
      accounts:
        - rrg-bengioy-ad_gpu
        - rrg-bengioy-ad_cpu
        - def-bengioy_gpu
        - def-bengioy_cpu
      sacct_bin: "/opt/software/slurm/bin/sacct"
      prometheus_url: https://mila-thanos.calculquebec.ca
      #prometheus_headers: ../SARC_secrets/secrets/drac_prometheus/headers.json
      start_date: "2025-06-19"
      user_domain: drac
      gpus_per_nodes:
        __DEFAULTS__:
          h100: H100-SXM5-80GB
          "NVIDIA H100 80GB HBM3": $h100
