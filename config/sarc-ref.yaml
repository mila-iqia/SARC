sarc:
  db: # DB connection parameters
    host: "localhost" # either a hostname or an GCP instance name
    port: 5432 # The port to connect to, ignored if host is a GCP instance name
    user:
      "postgres" # The username to connect to the DB with.
      # This defaults to the content of the PGUSER environnment variable or the local user,
      # unless host is a GCP instance name in which case it will use the
      # default service account for the machine
  patches: "patches" # this is the path to the patches directory
  server: # API server config
    auth: # If null, disables authentification for the API
      # easy-oauth config, see https://pypi.org/project/easy-oauth/
  cache: "sarc-cache" # The path to the sarc cache for fetching and parsing
  health_monitor:
    parameterizations: { "key": ["val1", "val2"] } # Parameterizations for the checks
    checks:
      cluster_scraping: # This is an example of a check config, see the documentation about
        # health checks for the different checks available and their parameters
        $class: "sarc.alerts.usage_alerts.cluster_scraping:ClusterScrapingCheck"
        active: true
        time_unit: "0s"
  users:
    scrapers: # This is a list of scraping directives
      - drac: # The key is the plugin name (which can be repeated)
          # The rest is the plugin config data.
          # See the documentation about user plugins for their config options
          csv: "1, 2, 3"
          csv_date: "2025-01-02"
  clusters:
    mila: # The cluster name. This must be the same name as slurm thinks it is
      host: login.server.mila.quebec # Host to connect to to run sacct commands
      private_key:
        file: "some_file" # The file that contains the ssh private key to connect to this cluster
        password: "" # Optional password to decrypt the private key, if it is encrypted
      timezone: America/Montreal # The timezone of the cluster
      accounts: # list of slurm accounts to fetch job data for. Fetch data for all jobs if left empty
        - abc
        - def
      sacct_bin: "/opt/slurm/bin/sacct" # Path to the sacct binary on the cluster
      prometheus_url:
        http://prometheus01.server.mila.quebec:9090/ # Prometheus server with data from https://github.com/guilbaults/slurm-job-exporter,
        # can be ommited if there is no data
      start_date: "2022-04-01" # The date the cluster went online
      billing_is_gpu: true # Deprecated, can be ignored
      user_domain: mila # The domain key for users on this cluster.  Refer to the user plugins documentation for more information
      gpus_per_nodes: # Table mapping which node have which kind of GPU along with canonical mapping for RGU computations
        __DEFAULTS__:
          rtx8000: RTX8000
          NVIDIA A100 80GB PCIe: A100-PCIe-80GB
          NVIDIA A100-SXM4-40GB: A100-SXM4-40GB
          NVIDIA A100-SXM4-80GB: A100-SXM4-80GB
          NVIDIA H100 80GB HBM3: H100-SXM5-80GB
          NVIDIA L40S: L40S
          l40S: L40S
          NVIDIA RTX A6000: A6000
          Quadro RTX 8000: RTX8000
          Tesla V100-SXM2-32GB: V100-SXM2-32GB
          Tesla V100-SXM2-32GB-LS: V100-SXM2-32GB
        cn-b[001-005]:
          v100: V100-SXM2-32GB
        cn-d[001-002]:
          a100: A100-SXM4-40GB
        cn-d[003-004]:
          a100l: A100-SXM4-80GB
        cn-e[002-003]:
          v100: V100-SXM2-32GB
        cn-g[001-029]:
          a100l: A100-SXM4-80GB
          2g.20gb: __MIG_FLAG__a100l
          3g.40gb: __MIG_FLAG__a100l
          4g.40gb: __MIG_FLAG__a100l
        cn-i001:
          a100l: A100-PCIe-80GB
        cn-j001:
          a6000: A6000
        cn-k[001-004]:
          a100: A100-SXM4-40GB
        cn-l[001-091]:
          l40s: L40S
        cn-n[001-002]:
          h100: H100-SXM5-80GB
  logging:
    log_level: INFO # The default log level
    OTLP_endpoint: https://localhost/otlp_reciever # Optional OTLP endpoint to send the logs to
    service_name: sarc-dev # service name used for OTLP, must be set to enable OTLP
    slack: # Optional config to get messages about jobs on slack
      description: SARC-prod # used to distinguish multiple instances if the message the same channel
      token: slack-token-replace-me # SENSITIVE: can be used to send messages on slack
      channel: slack-channel-id-replace-me # The slack channel ID to message
  notifications:
    slack: # Credentials for delivering user DMs and the admin digest
      description: Usage Alerts # used to distinguish multiple instances if the message the same channel
      token: slack-token-replace-me # SENSITIVE: can be used to send messages on slack
      channel: slack-channel-id-replace-me # The slack channel ID to message
    underusage_report_template: "" # Template for the per-user underusage DM body; placeholders:
      # {name}, {window_weeks}, {avg_utilization}, {rgu_hours_wasted}, {jobs_section}.
      # Normally loaded from a file, see config/usage_notify/underusage_report_template.md
    usage_report_template: "" # Template for the neutral usage report body; placeholders:
      # {name}, {window_weeks}, {avg_utilization}, {rgu_hours_used}, {jobs_section}.
      # Normally loaded from a file, see config/usage_notify/usage_report_template.md
    # resources_section: "" # Text appended to the footer of both underusage DMs and usage
      # reports. Normally loaded from a file, see config/usage_notify/resources_section.md
    # help_section: "" # Text appended to the footer of underusage DMs only (not usage
      # reports). Normally loaded from a file, see config/usage_notify/help_section.md
    enabled: True # Master switch; when False the notify command is a no-op
    send_underusage_report: True # Enable the user underusage DMs and the admin digest
    send_usage_report: True # Enable the neutral usage report to all active GPU users
    usage_cycle_length_weeks: 2 # Weeks per usage cycle (base cadence unit for alerts/report window)
    # --- Individual underusage alerts (user DMs) + admin digest ---
    min_waste_ratio: 0.80 # Min scaled waste ratio (1 - effective_util) to flag a user
    min_waste_rgu_hours: 3225.6 # Min scaled wasted RGU-h to flag a user (~4x A100-80GB RGU x 7d)
    digest_top_n: 16 # Number of top wasters listed in the admin digest ranking
    top_jobs_per_user: 5 # Number of a user's worst jobs shown per user
    historical_months: 6 # Calendar months included in the digest historical-trend section
    recurrence_cluster_share: 0.50 # Cluster waste fraction at which per-cluster selection stops
    recurrence_active_cycles: 3 # Recent cycles counting toward personalized-action + recurrence window
    recurrence_display_cycles: 5 # Per-cycle columns shown in the recurring-users table
    personalized_action_min_waste_rgu_hours: 96768 # Summed scaled wasted RGU-h over active cycles to flag for action
    # --- Universal usage report (neutral, all active GPU users) ---
    usage_report_cycles: 2 # Usage-report window length, in usage cycles
    usage_report_min_usage_rgu_hours: 1843.2 # Min occupied (used+wasted) RGU-h to include a user (~4x A100-80GB RGU x 4d)
    dashboard_url: dashboard-url-replace-me # Dashboard link inserted into user-facing messages

    clusters: # Cluster-name allowlist scoping every query; empty list = all clusters
      - mila
    utilization_ceiling: 1.0 # T in (0,1]; wasted = max(0, rgu_h * (T - m)); 1.0 = true waste
